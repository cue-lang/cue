syntax = "proto3";

package cue;

// This file exists only for compatibility with proto definitions that
// import "cue/cue.proto", the path at which the CUE options were
// originally published. New definitions should import
// "cueproto/cue.proto" instead.
//
// TODO(v0.19): remove this file and its generated Go package.
import public "cueproto/cue.proto";

option go_package = "cuelang.org/go/encoding/protobuf/cue";
option java_package = "org.cuelang.cueproto";
